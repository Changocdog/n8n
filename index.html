<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Boss AI - Visual Workflow Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(to right, #000000, #0a0a2a);
      color: #00bfff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      text-align: center;
      padding: 10px;
      font-size: 1.5em;
      text-shadow: 0 0 5px #00bfff;
    }
    #toolbar {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 10px;
    }
    button {
      background: #111;
      border: 1px solid #00bfff;
      color: #00bfff;
      padding: 10px 16px;
      border-radius: 6px;
      font-family: inherit;
      cursor: pointer;
    }
    #canvas {
      flex: 1;
      margin: 0 auto;
      width: 95vw;
      background-color: #111;
      border: 2px solid #00bfff;
      position: relative;
    }
    .node {
      width: 140px;
      height: 60px;
      background: #222;
      color: #00bfff;
      border: 1px solid #00bfff;
      border-radius: 8px;
      position: absolute;
      padding: 10px;
      cursor: move;
      text-align: center;
      box-shadow: 0 0 5px #00bfff;
    }
  </style>
</head>
<body>
  <header>🚀 Boss AI - Visual Workflow Builder</header>
  <div id="toolbar">
    <button onclick="createNode()">➕ Add Node</button>
    <button onclick="exportWorkflow()">📤 Export</button>
    <button onclick="importWorkflow()">📥 Import</button>
    <button onclick="clearCanvas()">🧹 Clear</button>
    <button onclick="runWorkflow()">▶️ Run</button>
  </div>
  <div id="canvas"></div>

  <script>
    const canvas = document.getElementById('canvas');
    let nodes = [];

    function createNode(name = "🧩 Node", x = 100, y = 100) {
      const node = document.createElement('div');
      node.className = 'node';
      node.textContent = name;
      node.style.left = x + 'px';
      node.style.top = y + 'px';
      canvas.appendChild(node);

      node.onmousedown = function (e) {
        const shiftX = e.clientX - node.getBoundingClientRect().left;
        const shiftY = e.clientY - node.getBoundingClientRect().top;
        function moveAt(pageX, pageY) {
          node.style.left = pageX - shiftX + 'px';
          node.style.top = pageY - shiftY + 'px';
        }
        function onMouseMove(e) {
          moveAt(e.pageX, e.pageY);
        }
        document.addEventListener('mousemove', onMouseMove);
        node.onmouseup = () => {
          document.removeEventListener('mousemove', onMouseMove);
        };
      };
      node.ondragstart = () => false;

      nodes.push({ name, x, y });
    }

    function exportWorkflow() {
      const exported = Array.from(document.querySelectorAll('.node')).map(node => ({
        name: node.textContent,
        x: parseInt(node.style.left),
        y: parseInt(node.style.top)
      }));
      navigator.clipboard.writeText(JSON.stringify(exported, null, 2));
      alert('Workflow copied to clipboard!');
    }

    function importWorkflow() {
      const json = prompt('Paste workflow JSON here:');
      try {
        const data = JSON.parse(json);
        clearCanvas();
        data.forEach(n => createNode(n.name, n.x, n.y));
      } catch (e) {
        alert('Invalid JSON');
      }
    }

    function clearCanvas() {
      canvas.innerHTML = '';
      nodes = [];
    }

    function runWorkflow() {
      alert('Executing workflow (mock logic)');
    }
  </script>
</body>
</html>
